<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <script>
      // Workaround for libraries that try to overwrite window.fetch in environments where it is read-only
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function(v) { console.warn('Ignored attempt to overwrite window.fetch'); },
          configurable: true
        });
      } catch (e) {
        console.warn('Failed to patch window.fetch', e);
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
